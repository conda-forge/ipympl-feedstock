# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: 0.9.7

package:
  name: ipympl
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/ipympl/ipympl-${{ version }}.tar.gz
  sha256: 3e505a56b6e9a7bfc4d40c1a861a0547adb16820eb67ec79131335dd0a5084f0

build:
  number: 2
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . --no-deps -vv --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - hatch-jupyter-builder >=0.8.3
    - hatch-nodejs-version >=0.3.2
    - hatchling
    - jupyterlab 4.*
    - pip
    - python ${{ python_min }}.*
    - setuptools
    - yarn
  run:
    - python >=${{ python_min }}
    - ipython <10
    - numpy
    - pillow
    - traitlets <6
    - ipywidgets >=7.6.0,<9
    - matplotlib-base >=3.5.0,<4

tests:
  - python:
      imports: ipympl
      pip_check: true
      python_version:
        - ${{ python_min  }}.*
        - 3.13.*
  - package_contents:
      files:
        - share/jupyter/nbextensions/jupyter-matplotlib/extension.js
        - share/jupyter/nbextensions/jupyter-matplotlib/index.js
        - share/jupyter/labextensions/jupyter-matplotlib/package.json

about:
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Matplotlib Jupyter Extension
  homepage: https://github.com/matplotlib/ipympl

extra:
  recipe-maintainers:
    - JasonGrout
    - SylvainCorlay
    - tacaswell
    - blink1073
    - martinRenou
